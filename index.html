<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>dither-ui — A dithered UI toolkit for Vue</title>
    <meta
      name="description"
      content="dither-ui is a Vue 3 UI toolkit rendered on one ordered-dither canvas engine: composable area, line, bar, pie and radar charts plus 55 Base UI-parity components — buttons, avatars, gradients, forms, overlays — all seed-generative. MIT licensed."
    />
    <meta
      name="keywords"
      content="dither, dithering, Vue, Vue 3, UI toolkit, component library, charts, canvas, pixel art, ordered dither, Bayer, seed-generative, shadcn, Base UI, data visualization"
    />
    <meta name="author" content="dither-ui" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://dither-ui.com/" />

    <!-- Discord / Chrome address-bar accent (the embed's coloured side bar) -->
    <meta name="theme-color" content="#3f8ff3" />

    <!-- Icons -->
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%BASE_URL%favicon.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />

    <!-- Open Graph (Discord, Facebook, LinkedIn, Slack, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="dither-ui" />
    <meta property="og:title" content="dither-ui — A dithered UI toolkit for Vue" />
    <meta
      property="og:description"
      content="Composable dithered charts and 55 seed-generative Vue components on one ordered-dither canvas engine. MIT licensed."
    />
    <meta property="og:url" content="https://dither-ui.com/" />
    <meta property="og:image" content="https://dither-ui.com/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="dither-ui wordmark over a dithered blue and purple area-chart horizon"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="dither-ui — A dithered UI toolkit for Vue" />
    <meta
      name="twitter:description"
      content="Composable dithered charts and 55 seed-generative Vue components on one ordered-dither canvas engine. MIT licensed."
    />
    <meta name="twitter:image" content="https://dither-ui.com/og.png" />
    <meta
      name="twitter:image:alt"
      content="dither-ui wordmark over a dithered blue and purple area-chart horizon"
    />

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "dither-ui",
        "description": "A Vue 3 UI toolkit rendered on one ordered-dither canvas engine: composable charts plus 55 seed-generative Base UI-parity components.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "url": "https://dither-ui.com/",
        "image": "https://dither-ui.com/og.png",
        "license": "https://opensource.org/licenses/MIT",
        "author": { "@type": "Organization", "name": "dither-ui" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
